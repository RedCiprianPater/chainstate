name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Minimal token permissions — write to nothing in the repo itself.
# Only the CF + HF secrets do any external work.
permissions:
  contents: read

jobs:
  cf-worker:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps (if any)
        run: |
          if [ -f package-lock.json ]; then npm ci; \
          elif [ -f package.json ]; then npm install; \
          else echo "no package.json — skipping install"; fi
      - name: Deploy Worker via wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:  ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          # wrangler.toml at repo root is auto-detected.
          # On first run, this CREATES the worker with name=chainstate-worker
          # (no need to pre-create it in the Cloudflare dashboard).

  hf-space:
    name: Push HF Space
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install --quiet huggingface_hub
      - name: Upload to HF Space (fine-grained token, scoped to CPater/chainstate only)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_folder(
              folder_path=".",
              repo_id="CPater/chainstate",
              repo_type="space",
              ignore_patterns=[
                  ".git*", "node_modules*", ".github*",
                  "workers*", "wrangler.toml", "package*.json",
                  "src*", "contracts*", "docs*", "hf-chat*",
                  "*.pyc", "__pycache__*",
              ],
          )
          print("HF Space updated ✓")
          PY
