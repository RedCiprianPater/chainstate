name = "chainstate-worker"
main = "workers/edge-worker.js"
compatibility_date = "2024-09-23"

# -----------------------------------------------------------------
# KV namespaces — OPTIONAL. The worker runs without them (graceful
# fallback: no cache, no beacon persistence, no rate limit) so you
# can deploy the CORS-hardened worker immediately and add KV later.
#
# To enable persistence and caching:
#
#   1. Create the three namespaces on your laptop:
#      npx wrangler kv:namespace create CHAINSTATE_NODES
#      npx wrangler kv:namespace create CHAINSTATE_CACHE
#      npx wrangler kv:namespace create CHAINSTATE_CONSENSUS
#
#   2. Each command prints something like:
#      { binding = "CHAINSTATE_NODES", id = "1a2b3c4d5e6f7890ab..." }
#
#   3. Uncomment the three blocks below, paste the printed `id`
#      values into the matching block, commit and redeploy.
# -----------------------------------------------------------------

# [[kv_namespaces]]
# binding = "CHAINSTATE_NODES"
# id      = "PASTE_REAL_ID_HERE"
#
# [[kv_namespaces]]
# binding = "CHAINSTATE_CACHE"
# id      = "PASTE_REAL_ID_HERE"
#
# [[kv_namespaces]]
# binding = "CHAINSTATE_CONSENSUS"
# id      = "PASTE_REAL_ID_HERE"

[vars]
SWARM_SIZE         = "50"
CONSENSUS_DEPTH    = "3"
CACHE_TTL          = "300"     # seconds; 5 minutes
RATE_LIMIT         = "60"      # per IP per minute

# Optional — uncomment to bind a custom route on a CF zone you own:
# routes = [
#   { pattern = "chainstate.example.com/*", zone_name = "example.com" },
# ]
