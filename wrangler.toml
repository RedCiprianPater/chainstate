name = "chainstate-worker"
main = "workers/edge-worker.js"
compatibility_date = "2024-09-23"

# -----------------------------------------------------------------
# KV namespaces — IDs match the three namespaces visible in the
# Cloudflare dashboard (Workers & Pages → KV). Recover/rotate via:
#   wrangler kv:namespace list
# -----------------------------------------------------------------

[[kv_namespaces]]
binding = "CHAINSTATE_NODES"
id      = "5f5daf062a6643acbf8fd667ccc93ace"

[[kv_namespaces]]
binding = "CHAINSTATE_CACHE"
id      = "5c92ee3b27fa417384bedb2c816ee7d3"

[[kv_namespaces]]
binding = "CHAINSTATE_CONSENSUS"
id      = "88101057669545978a49471f50071b75"

[vars]
SWARM_SIZE         = "50"
CONSENSUS_DEPTH    = "3"
CACHE_TTL          = "300"     # seconds; 5 minutes
RATE_LIMIT         = "60"      # per IP per minute

# Optional — uncomment to bind a custom route on a CF zone you own:
# routes = [
#   { pattern = "chainstate.example.com/*", zone_name = "example.com" },
# ]
